<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ========== HEADER ========== -->
    <header>
        <h1 id="app-title">Favorite Character Collector</h1>
        <p id="app-subtitle">Add your favorite characters from different franchises, and rate them!</p>
    </header>

    <!-- ========== STATS SECTION ========== -->
    <!-- Use this area to display summary stats about your collection -->
    <section id="stats-section">
        <h2>Stats</h2>
        <div id="stats-display">
            <!-- Your JavaScript will fill this in -->
            <p>Total Characters: 0</p>
        </div>
    </section>

    <!-- ========== ADD ITEM FORM ========== -->
    <!-- These inputs let the user add a new item to the collection -->
    <!-- Rename the labels and add/remove inputs to fit YOUR theme -->
    <section id="add-section">
        <h2>Add New Character</h2>
        <div id="form-container">
            <label for="input-name">Name:</label>
            <input type="text" id="input-name" placeholder="Enter name...">

            <label for="input-franchise">Franchise:</label>
            <input type="text" id="input-category" placeholder="Enter franchise...">

            <label for="input-rating">Rating (1-10):</label>
            <input type="number" id="input-rating" min="1" max="10" placeholder="1-10">

            <label for="input-notes">Notes:</label>
            <input type="text" id="input-notes" placeholder="Opinions, extra info, etc...">

            <button id="add-btn">Add Character</button>
        </div>
    </section>

    <!-- ========== SEARCH / FILTER ========== -->
    <section id="search-section">
        <label for="search-input"> Search In Collection:</label>
        <input type="text" id="search-input" placeholder="Type to search...">
    </section>

    <!-- ========== COLLECTION DISPLAY ========== -->
    <!-- Your JavaScript will build cards/items here -->
    <section id="collection-section">
        <h2>My Favorite Characters:</h2>
        <div id="collection-display">
            <!-- Items will be rendered here by your render function -->
        </div>
    </section>

    <!-- ========== YOUR JAVASCRIPT FILE ========== -->
    <!-- Create an app.js file and link it here -->
    <script src="app.js"></script>

</body>
</html>
